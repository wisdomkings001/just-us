<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JustUs — Watch Together</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #07070f;
  --surface: #0d0d1c;
  --surface2: #141428;
  --border: rgba(255,255,255,0.07);
  --gold: #d4956a;
  --gold-soft: rgba(212,149,106,0.1);
  --rose: #c96b7a;
  --text: #f0ebe4;
  --muted: #6b6880;
  --online: #4ade80;
  --offline: #3d3d5c;
}

html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow:hidden; }

/* ── SCREENS ── */
.screen { position:fixed; inset:0; display:flex; flex-direction:column; opacity:0; pointer-events:none; transition:opacity 0.65s ease; }
.screen.active { opacity:1; pointer-events:all; }

/* ── INTRO ── */
#s-intro {
  align-items:center; justify-content:center;
  background: radial-gradient(ellipse at center, #0f0920 0%, var(--bg) 70%);
  z-index:50;
}

.intro-logo { text-align:center; display:flex; flex-direction:column; align-items:center; gap:1.2rem; }

.logo-row { display:flex; align-items:baseline; gap:0.05em; }

.logo-just {
  font-family:'Playfair Display',serif; font-size:clamp(3.5rem,13vw,6.5rem);
  font-weight:400; color:var(--text);
  opacity:0; transform:translateY(24px);
  animation:riseIn 1s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
}

.logo-us {
  font-family:'Playfair Display',serif; font-size:clamp(3.5rem,13vw,6.5rem);
  font-weight:700; font-style:italic; color:var(--gold);
  opacity:0; transform:translateY(24px);
  animation:riseIn 1s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
}

.logo-dot {
  width:8px; height:8px; border-radius:50%; background:var(--rose);
  margin-left:6px; margin-bottom:10px; flex-shrink:0;
  opacity:0; animation:popIn 0.5s ease 1.4s forwards;
}

.intro-bar {
  width:60px; height:1px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity:0; animation:riseIn 0.9s ease 1.6s forwards;
}

.intro-tag {
  font-size:0.72rem; letter-spacing:0.35em; text-transform:uppercase;
  color:var(--muted);
  opacity:0; animation:riseIn 0.9s ease 1.2s forwards;
}

/* ── HOME ── */
#s-home {
  align-items:center; justify-content:center;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 25% 35%, rgba(212,149,106,0.05) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 65%, rgba(201,107,122,0.04) 0%, transparent 55%);
}

.home-wrap { width:100%; max-width:400px; padding:2rem; display:flex; flex-direction:column; gap:2.5rem; }

.home-brand { text-align:center; }
.home-brand h1 { font-family:'Playfair Display',serif; font-size:2rem; font-weight:400; }
.home-brand h1 em { font-style:italic; font-weight:700; color:var(--gold); }
.home-brand p { color:var(--muted); font-size:0.82rem; margin-top:0.4rem; letter-spacing:0.06em; }

.tabs { display:flex; border-bottom:1px solid var(--border); }
.tab-btn {
  flex:1; padding:0.75rem; background:none; border:none;
  color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.88rem;
  cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px;
  transition:color 0.2s,border-color 0.2s;
}
.tab-btn.on { color:var(--gold); border-bottom-color:var(--gold); }

.tab-pane { display:none; flex-direction:column; gap:1rem; margin-top:1.5rem; }
.tab-pane.on { display:flex; }

.field { display:flex; flex-direction:column; gap:0.45rem; }
.field label { font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
.field input {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:0.85rem 1rem; color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:0.95rem; outline:none; transition:border-color 0.2s;
}
.field input:focus { border-color:rgba(212,149,106,0.45); }
.field input::placeholder { color:var(--muted); }

.btn-primary {
  background:var(--gold); color:#180d00; border:none; border-radius:8px;
  padding:0.9rem; font-family:'DM Sans',sans-serif; font-size:0.95rem;
  font-weight:600; cursor:pointer; letter-spacing:0.04em;
  transition:opacity 0.2s, transform 0.15s;
}
.btn-primary:hover { opacity:0.87; }
.btn-primary:active { transform:scale(0.98); }

/* ── ROOM ── */
#s-room { flex-direction:row; }

/* VIDEO SIDE */
#video-area { flex:1; position:relative; background:#000; display:flex; align-items:center; justify-content:center; overflow:hidden; min-width:0; }

#video-el { width:100%; height:100%; object-fit:contain; background:#000; display:block; }

/* top bar */
#room-bar {
  position:absolute; top:0; left:0; right:0; z-index:10;
  padding:1rem 1.2rem;
  background:linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
  display:flex; align-items:center; justify-content:space-between;
  opacity:0; transition:opacity 0.3s;
}
#video-area:hover #room-bar,
#video-area.ctrls #room-bar { opacity:1; }

.room-brand { font-family:'Playfair Display',serif; font-size:1rem; }
.room-brand em { font-style:italic; font-weight:700; color:var(--gold); }

.room-right { display:flex; align-items:center; gap:0.8rem; flex-wrap:wrap; justify-content:flex-end; }

.users-bar { display:flex; align-items:center; gap:0.5rem; }
.u-pill {
  display:flex; align-items:center; gap:0.35rem;
  background:rgba(255,255,255,0.08); padding:0.28rem 0.65rem;
  border-radius:20px; font-size:0.75rem; backdrop-filter:blur(6px);
}
.dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--offline); transition:background 0.4s;
}
.dot.on { background:var(--online); }

.room-code-btn {
  font-size:0.72rem; letter-spacing:0.12em;
  color:var(--muted); background:rgba(255,255,255,0.07);
  padding:0.3rem 0.75rem; border-radius:20px;
  cursor:pointer; border:none; backdrop-filter:blur(6px);
  transition:background 0.2s; color:var(--text);
}
.room-code-btn:hover { background:rgba(255,255,255,0.12); }

/* video controls */
#vid-controls {
  position:absolute; bottom:0; left:0; right:0; z-index:10;
  padding:2rem 1.2rem 1.2rem;
  background:linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
  display:flex; flex-direction:column; gap:0.75rem;
  opacity:0; transition:opacity 0.3s;
}
#video-area:hover #vid-controls,
#video-area.ctrls #vid-controls { opacity:1; }

.prog-wrap {
  position:relative; height:4px;
  background:rgba(255,255,255,0.2); border-radius:2px; cursor:pointer;
}
.prog-fill { height:100%; background:var(--gold); border-radius:2px; pointer-events:none; width:0%; transition:width 0.1s linear; }
.prog-thumb {
  position:absolute; top:50%; left:0%;
  transform:translate(-50%,-50%);
  width:13px; height:13px; border-radius:50%; background:var(--gold);
  pointer-events:none; opacity:0; transition:opacity 0.2s;
}
.prog-wrap:hover .prog-thumb { opacity:1; }

.ctrl-row { display:flex; align-items:center; gap:0.8rem; }

.c-btn {
  background:none; border:none; color:var(--text);
  font-size:1.15rem; cursor:pointer; padding:0.25rem;
  opacity:0.85; transition:opacity 0.2s, transform 0.15s;
  line-height:1; display:flex; align-items:center;
}
.c-btn:hover { opacity:1; transform:scale(1.12); }
.c-btn.lg { font-size:1.55rem; }

.time-txt { font-size:0.8rem; color:rgba(255,255,255,0.65); flex:1; font-variant-numeric:tabular-nums; }

/* upload overlay */
#upload-ov {
  position:absolute; inset:0; z-index:5;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:1.5rem; background:#000; text-align:center; padding:2rem;
}
#upload-ov h2 { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:400; }
#upload-ov p { color:var(--muted); font-size:0.88rem; max-width:260px; line-height:1.6; }

.drop-zone {
  border:1px dashed rgba(212,149,106,0.4); border-radius:12px;
  padding:2.5rem 3rem; cursor:pointer; transition:border-color 0.2s, background 0.2s;
}
.drop-zone:hover { border-color:var(--gold); background:var(--gold-soft); }
.drop-icon { font-size:2.8rem; margin-bottom:0.75rem; }
.drop-zone span { color:var(--gold); }

/* waiting overlay */
#wait-ov {
  position:absolute; inset:0; z-index:5;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  gap:1rem; background:#000;
}
#wait-ov.show { display:flex; }
.spinner {
  width:38px; height:38px; border-radius:50%;
  border:2px solid rgba(212,149,106,0.2);
  border-top-color:var(--gold);
  animation:spin 1s linear infinite;
}
#wait-ov p { color:var(--muted); font-size:0.88rem; }

/* CHAT PANEL */
#chat-panel {
  width:300px; flex-shrink:0;
  background:var(--surface); border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  position:absolute; right:0; top:0; bottom:0; z-index:20;
  transform:translateX(100%);
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
#chat-panel.open { transform:translateX(0); }

@media(min-width:900px){
  #chat-panel { position:relative; transform:none !important; }
  #chat-float { display:none !important; }
}

.chat-hdr {
  padding:1rem 1.1rem; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.chat-hdr h3 { font-family:'Playfair Display',serif; font-size:0.95rem; font-weight:400; font-style:italic; }
.close-c { background:none; border:none; color:var(--muted); font-size:1.1rem; cursor:pointer; display:none; }
@media(max-width:899px){ .close-c { display:block; } }

#chat-msgs {
  flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column;
  gap:0.75rem; scrollbar-width:thin; scrollbar-color:var(--surface2) transparent;
}
#chat-msgs::-webkit-scrollbar { width:3px; }
#chat-msgs::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:2px; }

.msg { display:flex; flex-direction:column; gap:0.2rem; max-width:90%; }
.msg.me { align-self:flex-end; align-items:flex-end; }
.msg.them { align-self:flex-start; }
.msg-name { font-size:0.65rem; color:var(--muted); }
.msg-bub {
  padding:0.55rem 0.85rem; border-radius:12px;
  font-size:0.86rem; line-height:1.5; word-break:break-word;
}
.msg.me .msg-bub { background:var(--gold); color:#180d00; border-bottom-right-radius:3px; }
.msg.them .msg-bub { background:var(--surface2); color:var(--text); border-bottom-left-radius:3px; }
.msg-voice {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:20px; padding:0.5rem 0.9rem;
  display:flex; align-items:center; gap:0.5rem;
  cursor:pointer; font-size:0.8rem; color:var(--muted);
  transition:background 0.2s;
}
.msg-voice:hover { background:rgba(255,255,255,0.1); }
.msg.me .msg-voice { background:rgba(212,149,106,0.18); border-color:rgba(212,149,106,0.3); }
.msg-time { font-size:0.62rem; color:var(--muted); }

.chat-bottom {
  padding:0.75rem 0.85rem; border-top:1px solid var(--border);
  display:flex; align-items:center; gap:0.5rem; flex-shrink:0;
}
#chat-in {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  border-radius:20px; padding:0.6rem 0.9rem; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:0.85rem; outline:none;
  transition:border-color 0.2s;
}
#chat-in:focus { border-color:rgba(212,149,106,0.35); }
#chat-in::placeholder { color:var(--muted); }

.i-btn {
  width:34px; height:34px; border-radius:50%; border:none;
  background:var(--surface2); color:var(--muted); font-size:0.95rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background 0.2s, color 0.2s;
}
.i-btn:hover { background:var(--gold-soft); color:var(--gold); }
.i-btn.rec { background:rgba(201,107,122,0.2); color:var(--rose); animation:pulse 1s ease infinite; }
.i-btn.send-btn { background:var(--gold); color:#180d00; }
.i-btn.send-btn:hover { opacity:0.85; }

/* floating chat button */
#chat-float {
  position:absolute; bottom:4.8rem; right:1rem; z-index:15;
  width:40px; height:40px; border-radius:50%;
  background:rgba(212,149,106,0.15);
  border:1px solid rgba(212,149,106,0.3);
  backdrop-filter:blur(8px);
}

.badge {
  position:absolute; top:-4px; right:-4px;
  width:16px; height:16px; border-radius:50%;
  background:var(--rose); font-size:0.6rem;
  display:none; align-items:center; justify-content:center;
  color:#fff; pointer-events:none;
}
.badge.show { display:flex; }

/* TOAST */
#toast {
  position:fixed; bottom:1.8rem; left:50%;
  transform:translateX(-50%) translateY(14px);
  background:rgba(20,20,40,0.95); border:1px solid var(--border);
  color:var(--text); padding:0.6rem 1.1rem; border-radius:8px;
  font-size:0.82rem; opacity:0; transition:opacity 0.3s, transform 0.3s;
  z-index:300; backdrop-filter:blur(8px); pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

#file-input-el { display:none; }

/* ANIMATIONS */
@keyframes riseIn {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.2); }
  to   { opacity:1; transform:scale(1); }
}
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes pulse {
  0%,100% { box-shadow:0 0 0 0 rgba(201,107,122,0.5); }
  50%      { box-shadow:0 0 0 6px rgba(201,107,122,0); }
}
</style>
</head>
<body>

<!-- ══ INTRO ══════════════════════════════════════ -->
<div id="s-intro" class="screen active">
  <div class="intro-logo">
    <div class="logo-row">
      <span class="logo-just">Just</span>
      <span class="logo-us">Us</span>
      <div class="logo-dot"></div>
    </div>
    <p class="intro-tag">Watch together · Feel closer</p>
    <div class="intro-bar"></div>
  </div>
</div>

<!-- ══ HOME ═══════════════════════════════════════ -->
<div id="s-home" class="screen">
  <div class="home-wrap">
    <div class="home-brand">
      <h1>Just<em>Us</em></h1>
      <p>Your private watch party</p>
    </div>
    <div>
      <div class="tabs">
        <button class="tab-btn on" onclick="tab('create')">Create Room</button>
        <button class="tab-btn"   onclick="tab('join')">Join Room</button>
      </div>
      <div id="pane-create" class="tab-pane on">
        <div class="field"><label>Your name</label><input id="c-name" type="text" placeholder="Enter your name" maxlength="20"></div>
        <button class="btn-primary" onclick="createRoom()">Create Room →</button>
      </div>
      <div id="pane-join" class="tab-pane">
        <div class="field"><label>Your name</label><input id="j-name" type="text" placeholder="Enter your name" maxlength="20"></div>
        <div class="field"><label>Room code</label><input id="j-code" type="text" placeholder="6-digit code" maxlength="6" style="text-transform:uppercase"></div>
        <button class="btn-primary" onclick="joinRoom()">Join Room →</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ ROOM ═══════════════════════════════════════ -->
<div id="s-room" class="screen">

  <!-- VIDEO AREA -->
  <div id="video-area">

    <!-- Top bar -->
    <div id="room-bar">
      <div class="room-brand">Just<em>Us</em></div>
      <div class="room-right">
        <div class="users-bar">
          <div class="u-pill"><div class="dot" id="dot-h"></div><span id="nm-h">—</span></div>
          <div class="u-pill"><div class="dot" id="dot-g"></div><span id="nm-g">Waiting...</span></div>
        </div>
        <button class="room-code-btn" id="code-disp" onclick="copyInvite()">📎 ------</button>
      </div>
    </div>

    <!-- Video -->
    <video id="vid" playsinline></video>

    <!-- Upload overlay (host) -->
    <div id="upload-ov">
      <h2>Ready to watch?</h2>
      <p>Choose a movie file to stream directly to your partner</p>
      <div class="drop-zone" onclick="document.getElementById('file-input-el').click()">
        <div class="drop-icon">🎬</div>
        <p><span>Browse video file</span></p>
        <p style="margin-top:0.3rem;font-size:0.75rem;color:#555">MP4, MKV, AVI, WebM</p>
      </div>
      <input type="file" id="file-input-el" accept="video/*">
    </div>

    <!-- Waiting overlay (guest) -->
    <div id="wait-ov">
      <div class="spinner"></div>
      <p>Waiting for host to select a movie…</p>
    </div>

    <!-- Controls -->
    <div id="vid-controls">
      <div class="prog-wrap" id="prog-wrap">
        <div class="prog-fill" id="prog-fill"></div>
        <div class="prog-thumb" id="prog-thumb"></div>
      </div>
      <div class="ctrl-row">
        <button class="c-btn lg" id="pp-btn" onclick="togglePlay()">▶</button>
        <button class="c-btn" onclick="skip(-10)" title="Back 10s">⏪</button>
        <button class="c-btn" onclick="skip(10)"  title="Forward 10s">⏩</button>
        <span class="time-txt" id="time-txt">0:00 / 0:00</span>
        <button class="c-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
        <button class="c-btn" onclick="goFullscreen()">⛶</button>
      </div>
    </div>

    <!-- Floating chat btn (mobile) -->
    <button class="i-btn" id="chat-float" onclick="toggleChat()" style="position:absolute">
      💬
      <span class="badge" id="badge">0</span>
    </button>

  </div>

  <!-- CHAT PANEL -->
  <div id="chat-panel">
    <div class="chat-hdr">
      <h3>Chat</h3>
      <button class="close-c" onclick="toggleChat()">✕</button>
    </div>
    <div id="chat-msgs"></div>
    <div class="chat-bottom">
      <button class="i-btn" id="mic-btn"
        onmousedown="startRec()" ontouchstart="startRec(event)"
        onmouseup="stopRec()"   ontouchend="stopRec(event)"
        title="Hold to record voice">🎤</button>
      <input id="chat-in" type="text" placeholder="Say something…" maxlength="300"
        onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="i-btn send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Firebase v9 compat (confirmed working CDN) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── REFRESH WARNING ────────────────────────────────────────
window.addEventListener('beforeunload', e => {
  if (roomId) {
    e.preventDefault();
    e.returnValue = 'Refreshing will disconnect you from the watch party. Are you sure?';
    return e.returnValue;
  }
});

// ── FIREBASE CONFIG ────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyA2C4KP_M7S8KdZ3Nfo2DrQKnGUdD5t7HE",
  authDomain: "justus-app-c353a.firebaseapp.com",
  projectId: "justus-app-c353a",
  storageBucket: "justus-app-c353a.firebasestorage.app",
  messagingSenderId: "76949984065",
  appId: "1:76949984065:web:428a0d348a3c3ab31f47c0",
  databaseURL: "https://justus-app-c353a-default-rtdb.firebaseio.com"
});
const db = firebase.database();

// ── STATE ──────────────────────────────────────────────────
let role=null, roomId=null, myName=null, roomRef=null;
let pc=null, localStream=null;
let mediaRec=null, audioChunks=[], isRec=false;
let chatOpen=false, unread=0;

const vid   = document.getElementById('vid');
const fileEl = document.getElementById('file-input-el');

const ICE = { iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'}
]};

// ── INTRO ──────────────────────────────────────────────────
setTimeout(() => {
  showScr('s-home');
  const qr = new URLSearchParams(location.search).get('room');
  if (qr) { tab('join'); document.getElementById('j-code').value = qr.toUpperCase(); }
}, 2800);

// ── UI HELPERS ─────────────────────────────────────────────
function showScr(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function tab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',(i===0&&t==='create')||(i===1&&t==='join')));
  document.getElementById('pane-create').classList.toggle('on', t==='create');
  document.getElementById('pane-join').classList.toggle('on', t==='join');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2800);
}

// ── ROOM CREATION ──────────────────────────────────────────
function genId() { return Math.random().toString(36).substr(2,6).toUpperCase(); }

async function createRoom() {
  const name = document.getElementById('c-name').value.trim();
  if (!name) { toast('Enter your name first'); return; }
  role='host'; myName=name; roomId=genId();
  roomRef = db.ref('rooms/'+roomId);
  await roomRef.set({ host:{name,online:true}, guest:{name:'',online:false}, created:Date.now() });
  roomRef.child('host/online').onDisconnect().set(false);
  enterRoom();
  setupHostFlow();
}

async function joinRoom() {
  const name = document.getElementById('j-name').value.trim();
  const code = document.getElementById('j-code').value.trim().toUpperCase();
  if (!name) { toast('Enter your name first'); return; }
  if (code.length!==6) { toast('Room code must be 6 characters'); return; }
  const snap = await db.ref('rooms/'+code).once('value');
  if (!snap.exists()) { toast('Room not found. Check the code.'); return; }
  role='guest'; myName=name; roomId=code;
  roomRef = db.ref('rooms/'+roomId);
  await roomRef.child('guest').update({name,online:true});
  roomRef.child('guest/online').onDisconnect().set(false);
  enterRoom();
  setupGuestFlow();
}

function enterRoom() {
  showScr('s-room');
  document.getElementById('code-disp').textContent = '📎 '+roomId;
  const url = new URL(location.href);
  url.searchParams.set('room', roomId);
  history.replaceState({},null,url);
  watchPresence();
  watchChat();
  watchControl();
}

// ── PRESENCE ───────────────────────────────────────────────
function watchPresence() {
  roomRef.child('host').on('value', s=>{
    const d=s.val()||{};
    document.getElementById('nm-h').textContent = d.name||'—';
    document.getElementById('dot-h').className = 'dot'+(d.online?' on':'');
  });
  roomRef.child('guest').on('value', s=>{
    const d=s.val()||{};
    document.getElementById('nm-g').textContent = d.name||'Waiting...';
    document.getElementById('dot-g').className = 'dot'+(d.online?' on':'');
  });
}

// ── HOST FLOW ──────────────────────────────────────────────
function setupHostFlow() {
  document.getElementById('upload-ov').style.display='flex';
  document.getElementById('wait-ov').classList.remove('show');

  fileEl.addEventListener('change', async e => {
    const file = e.target.files[0]; if (!file) return;
    document.getElementById('upload-ov').style.display='none';
    vid.src = URL.createObjectURL(file);
    vid.load();
    vid.addEventListener('canplay', async ()=>{
      await roomRef.child('videoReady').set(true);
      bindVideoUI();
      await doHostRTC();
    }, {once:true});
  });
}

async function doHostRTC() {
  pc = new RTCPeerConnection(ICE);

  // captureStream support: Chrome uses captureStream(), Firefox uses mozCaptureStream()
  const capture = vid.captureStream || vid.mozCaptureStream;
  if (!capture) { toast('Your browser does not support video streaming. Please use Chrome.'); return; }
  localStream = capture.call(vid);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  pc.onicecandidate = e => {
    if (e.candidate) roomRef.child('cands/host').push(e.candidate.toJSON());
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await roomRef.child('offer').set({sdp:offer.sdp, type:offer.type});

  roomRef.child('answer').on('value', async s=>{
    const a=s.val();
    if (a && !pc.currentRemoteDescription) {
      await pc.setRemoteDescription(new RTCSessionDescription(a));
    }
  });

  roomRef.child('cands/guest').on('child_added', async s=>{
    const c=s.val(); if(c) try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e){}
  });
}

// ── GUEST FLOW ─────────────────────────────────────────────
function setupGuestFlow() {
  document.getElementById('upload-ov').style.display='none';
  document.getElementById('wait-ov').classList.add('show');

  roomRef.child('videoReady').on('value', async s=>{
    if (s.val()) {
      document.getElementById('wait-ov').classList.remove('show');
      await doGuestRTC();
    }
  });
}

async function doGuestRTC() {
  pc = new RTCPeerConnection(ICE);

  pc.ontrack = e => {
    vid.srcObject = e.streams[0];
    vid.play().catch(()=>{});
    bindVideoUI();
  };

  pc.onicecandidate = e => {
    if (e.candidate) roomRef.child('cands/guest').push(e.candidate.toJSON());
  };

  const offerSnap = await roomRef.child('offer').once('value');
  const offer = offerSnap.val(); if (!offer) return;
  await pc.setRemoteDescription(new RTCSessionDescription(offer));

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await roomRef.child('answer').set({sdp:answer.sdp, type:answer.type});

  roomRef.child('cands/host').on('child_added', async s=>{
    const c=s.val(); if(c) try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e){}
  });
}

// ── VIDEO UI ───────────────────────────────────────────────
function bindVideoUI() {
  vid.addEventListener('timeupdate', updateProg);
  vid.addEventListener('play',  ()=>setPPBtn(true));
  vid.addEventListener('pause', ()=>setPPBtn(false));
}

function updateProg() {
  if (!vid.duration) return;
  const p = (vid.currentTime/vid.duration)*100;
  document.getElementById('prog-fill').style.width  = p+'%';
  document.getElementById('prog-thumb').style.left  = p+'%';
  document.getElementById('time-txt').textContent   = fmt(vid.currentTime)+' / '+fmt(vid.duration);
}

function fmt(s) {
  if (!s||isNaN(s)) return '0:00';
  const m=Math.floor(s/60), sec=Math.floor(s%60);
  return m+':'+String(sec).padStart(2,'0');
}

function setPPBtn(playing) {
  document.getElementById('pp-btn').textContent = playing ? '⏸' : '▶';
}

document.getElementById('prog-wrap').addEventListener('click', e=>{
  const r = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX-r.left)/r.width;
  vid.currentTime = pct * vid.duration;
  sendCtrl('seek');
});

// ── PLAYBACK CONTROL SYNC ──────────────────────────────────
let syncing = false;

function watchControl() {
  roomRef.child('ctrl').on('value', s=>{
    const d=s.val(); if (!d||d.by===role) return;
    syncing=true;
    if (d.action==='play') {
      if (role==='host') vid.play();
      else { vid.currentTime=d.time+(Date.now()-d.ts)/1000; vid.play(); }
    } else if (d.action==='pause') {
      vid.pause(); if(role==='guest') vid.currentTime=d.time;
    } else if (d.action==='seek') {
      vid.currentTime=d.time;
    }
    setTimeout(()=>syncing=false, 400);
  });
}

function sendCtrl(action) {
  if (!roomRef) return;
  roomRef.child('ctrl').set({ action, time:vid.currentTime, ts:Date.now(), by:role });
}

function togglePlay() {
  if (vid.paused) { vid.play(); sendCtrl('play'); }
  else { vid.pause(); sendCtrl('pause'); }
}

function skip(s) { vid.currentTime+=s; sendCtrl('seek'); }
function toggleMute() {
  vid.muted=!vid.muted;
  document.getElementById('mute-btn').textContent=vid.muted?'🔇':'🔊';
}
function goFullscreen() {
  if (!document.fullscreenElement) document.getElementById('video-area').requestFullscreen();
  else document.exitFullscreen();
}

// ── CHAT ───────────────────────────────────────────────────
function watchChat() {
  roomRef.child('msgs').on('child_added', s=>{
    renderMsg(s.val());
    if (!chatOpen) {
      unread++;
      const b=document.getElementById('badge');
      b.textContent=unread; b.classList.add('show');
    }
  });
}

function renderMsg(d) {
  const wrap=document.getElementById('chat-msgs');
  const div=document.createElement('div');
  div.className='msg '+(d.sender===myName?'me':'them');
  const nm=document.createElement('div'); nm.className='msg-name'; nm.textContent=d.sender;

  if (d.type==='voice') {
    const bub=document.createElement('div'); bub.className='msg-voice';
    bub.innerHTML='🎤 Voice message &nbsp;▶';
    bub.onclick=()=>new Audio(d.audio).play();
    const t=document.createElement('div'); t.className='msg-time';
    t.textContent=new Date(d.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    div.append(nm,bub,t);
  } else {
    const bub=document.createElement('div'); bub.className='msg-bub'; bub.textContent=d.text;
    const t=document.createElement('div'); t.className='msg-time';
    t.textContent=new Date(d.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    div.append(nm,bub,t);
  }
  wrap.appendChild(div);
  wrap.scrollTop=wrap.scrollHeight;
}

function sendMsg() {
  const inp=document.getElementById('chat-in');
  const txt=inp.value.trim(); if(!txt||!roomRef) return;
  roomRef.child('msgs').push({sender:myName,text:txt,type:'text',ts:Date.now()});
  inp.value='';
}

// ── VOICE ──────────────────────────────────────────────────
async function startRec(e) {
  if(e)e.preventDefault();
  if (isRec) return;
  try {
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec=new MediaRecorder(stream,{mimeType:'audio/webm'});
    audioChunks=[];
    mediaRec.ondataavailable=ev=>audioChunks.push(ev.data);
    mediaRec.start(); isRec=true;
    document.getElementById('mic-btn').classList.add('rec');
  } catch(err) { toast('Microphone access denied'); }
}

function stopRec(e) {
  if(e)e.preventDefault();
  if (!isRec||!mediaRec) return;
  mediaRec.onstop=async()=>{
    const blob=new Blob(audioChunks,{type:'audio/webm'});
    if (blob.size>600000) { toast('Voice message too long (max ~15s)'); return; }
    const reader=new FileReader();
    reader.onload=()=>{
      roomRef.child('msgs').push({sender:myName,type:'voice',audio:reader.result,ts:Date.now()});
    };
    reader.readAsDataURL(blob);
    mediaRec.stream.getTracks().forEach(t=>t.stop());
  };
  mediaRec.stop(); isRec=false;
  document.getElementById('mic-btn').classList.remove('rec');
}

// ── CHAT TOGGLE ────────────────────────────────────────────
function toggleChat() {
  chatOpen=!chatOpen;
  document.getElementById('chat-panel').classList.toggle('open',chatOpen);
  if (chatOpen) {
    unread=0;
    const b=document.getElementById('badge');
    b.textContent='0'; b.classList.remove('show');
  }
}

// ── INVITE ─────────────────────────────────────────────────
function copyInvite() {
  const url=location.origin+location.pathname+'?room='+roomId;
  navigator.clipboard.writeText(url).then(()=>toast('Invite link copied! Share it with your partner 🔗'));
}

// ── CONTROLS AUTO-HIDE ─────────────────────────────────────
let hideTimer;
document.getElementById('video-area').addEventListener('mousemove',()=>{
  const a=document.getElementById('video-area');
  a.classList.add('ctrls');
  clearTimeout(hideTimer);
  hideTimer=setTimeout(()=>a.classList.remove('ctrls'),3000);
});
document.getElementById('video-area').addEventListener('touchstart',()=>{
  const a=document.getElementById('video-area');
  a.classList.toggle('ctrls');
});
</script>
